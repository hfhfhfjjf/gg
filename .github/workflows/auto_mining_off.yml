name: Auto Mining Off

on:
  workflow_dispatch:        # API (cron-job.org) ya Manual trigger ke liye

# Warning ko fix karne ke liye yeh environment variable add kiya gaya hai
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-off:
    runs-on: ubuntu-latest

    steps:
      - name: Keep GitHub Actions Active (Ping GitHub API)
        run: curl -I https://api.github.com

      - uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4   # Isko v3 se v4 kar diya gaya hai
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run auto mining off script
        run: node auto_mining_off.js
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
